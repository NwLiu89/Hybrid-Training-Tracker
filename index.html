<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Hybrid Training Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;600&display=swap');

:root {
  --bg: #0d0d0f;
  --surface: #18181b;
  --surface2: #222226;
  --border: #2a2a2e;
  --chalk: #f0ede8;
  --bone: #b0a89e;
  --muted: #5a6070;
  --amber: #f0a500;
  --amber-dim: rgba(240,165,0,0.12);
  --red: #ff5c2b;
  --green: #3dbe6c;
  --blue: #3d9cf0;
  --purple: #9b7fe8;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg); color: var(--chalk);
  font-family: 'Barlow', sans-serif; font-weight: 300;
  min-height: 100vh; font-size: 14px; overscroll-behavior: none;
}

/* ── TOPBAR ── */
.topbar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; height: 52px; position: sticky; top: 0; z-index: 100;
}
.topbar-logo { display: flex; align-items: center; gap: 8px; }
.logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); }
.logo-text {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 17px; font-weight: 900; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--chalk);
}
.logo-text span { color: var(--amber); }

/* ── PAGES ── */
.page { display: none; padding: 16px 16px 90px; }
.page.active { display: block; }

/* ── WEEK STRIP ── */
.week-strip {
  display: grid; grid-template-columns: repeat(7, 1fr);
  gap: 5px; margin-bottom: 18px;
}
.day-chip {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 8px; padding: 7px 2px 6px; text-align: center;
  cursor: pointer; transition: all 0.15s; user-select: none;
}
.day-chip.active   { border-color: var(--amber); background: var(--amber-dim); }
.day-chip.done-a   { border-color: var(--red);   background: rgba(255,92,43,0.08); }
.day-chip.done-b   { border-color: var(--blue);  background: rgba(61,156,240,0.08); }
.day-chip.done-other { border-color: var(--green); background: rgba(61,190,108,0.08); }
.day-chip-lbl {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
  color: var(--muted); display: block;
}
.day-chip.active     .day-chip-lbl { color: var(--amber); }
.day-chip.done-a     .day-chip-lbl { color: var(--red); }
.day-chip.done-b     .day-chip-lbl { color: var(--blue); }
.day-chip.done-other .day-chip-lbl { color: var(--green); }
.day-chip-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px; font-weight: 700; text-transform: uppercase;
  color: var(--chalk); display: block; margin-top: 2px; line-height: 1.1;
}
.day-chip-dot { width: 5px; height: 5px; border-radius: 50%; margin: 4px auto 0; display: none; }
.day-chip.done-a     .day-chip-dot { display: block; background: var(--red); }
.day-chip.done-b     .day-chip-dot { display: block; background: var(--blue); }
.day-chip.done-other .day-chip-dot { display: block; background: var(--green); }

/* ── SESSION HEADER ── */
.session-hdr {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px 16px; margin-bottom: 16px;
}
.session-hdr-top { display: flex; justify-content: space-between; align-items: flex-start; }
.session-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 28px; font-weight: 900; text-transform: uppercase; line-height: 1;
}
.session-sub { font-size: 12px; color: var(--bone); margin-top: 4px; }
.session-badge {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
  padding: 4px 10px; border-radius: 4px; font-weight: 600; white-space: nowrap;
}
.badge-A     { background: rgba(255,92,43,0.15);  color: var(--red);    border: 1px solid rgba(255,92,43,0.3); }
.badge-B     { background: rgba(61,156,240,0.15); color: var(--blue);   border: 1px solid rgba(61,156,240,0.3); }
.badge-carry { background: rgba(155,127,232,0.15);color: var(--purple); border: 1px solid rgba(155,127,232,0.3); }
.badge-power { background: rgba(240,165,0,0.15);  color: var(--amber);  border: 1px solid rgba(240,165,0,0.3); }
.badge-cond  { background: rgba(61,190,108,0.15); color: var(--green);  border: 1px solid rgba(61,190,108,0.3); }
.badge-rest  { background: rgba(90,96,112,0.15);  color: var(--muted);  border: 1px solid rgba(90,96,112,0.3); }

/* ── DAY A/B SELECTOR ── */
.day-sel { display: flex; gap: 8px; margin-top: 12px; }
.day-sel-btn {
  flex: 1; padding: 10px; background: var(--surface2);
  border: 1.5px solid var(--border); border-radius: 8px;
  cursor: pointer; font-family: 'Barlow Condensed', sans-serif;
  font-size: 15px; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; color: var(--bone); text-align: center; transition: all 0.15s;
}
.day-sel-btn .dsub { font-size: 11px; color: var(--muted); font-weight: 400; display: block; margin-top: 2px; letter-spacing: 0; }
.day-sel-btn.sel-A { background: rgba(255,92,43,0.15); border-color: var(--red); color: var(--red); }
.day-sel-btn.sel-B { background: rgba(61,156,240,0.15); border-color: var(--blue); color: var(--blue); }
.day-sel-btn.sel-A .dsub, .day-sel-btn.sel-B .dsub { color: inherit; opacity: 0.7; }

/* ── SECTION LABEL ── */
.section-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--muted); margin: 18px 0 10px;
}

/* ── SUPERSET DIVIDER ── */
.ss-div { display: flex; align-items: center; gap: 10px; margin: 12px 0 8px; }
.ss-line { height: 1px; flex: 1; background: var(--border); }
.ss-lbl { font-size: 10px; font-weight: 700; color: var(--muted); letter-spacing: 2px; font-family: 'Barlow Condensed', sans-serif; }

/* ── EXERCISE BLOCK ── */
.exercise-block {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; margin-bottom: 8px; overflow: hidden;
}
.exercise-block.superset-end { margin-bottom: 4px; }
.exercise-hdr {
  display: flex; justify-content: space-between; align-items: center;
  padding: 11px 14px; cursor: pointer; user-select: none;
}
.exercise-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 17px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
}
.exercise-meta-row { display: flex; align-items: center; gap: 8px; }
.ex-scheme { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; color: var(--amber); font-weight: 600; }
.ex-rest-lbl { font-size: 11px; color: var(--muted); }
.ex-note-tag { font-size: 10px; color: var(--muted); font-style: italic; }
.ex-done-badge {
  width: 20px; height: 20px; border-radius: 50%; background: var(--green);
  display: none; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; color: #000;
}
.ex-done-badge.show { display: flex; }

.sets-container { border-top: 1px solid var(--border); padding: 10px 14px 12px; display: none; }
.sets-container.open { display: block; }

.prev-hint {
  font-size: 11px; color: var(--muted); margin-bottom: 10px;
  padding: 6px 10px; background: var(--surface2);
  border-radius: 4px; border-left: 2px solid var(--amber);
}
.prev-hint em { color: var(--amber); font-style: normal; font-weight: 500; }

/* ── SET ROWS ── */
/* 4-col: # | kg | reps | ✓ */
.sets-row-hdr {
  display: grid; grid-template-columns: 24px 1fr 1fr 32px;
  gap: 8px; margin-bottom: 6px;
}
.sets-row-hdr span {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted);
}
/* 3-col variant for distance-only: # | dist/notes | ✓ */
.sets-row-hdr.cols3 { grid-template-columns: 24px 1fr 32px; }
.set-row { display: grid; grid-template-columns: 24px 1fr 1fr 32px; gap: 8px; margin-bottom: 6px; align-items: center; }
.set-row.cols3 { grid-template-columns: 24px 1fr 32px; }
.set-num { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; color: var(--muted); text-align: center; font-weight: 600; }
.set-row.completed .set-num { color: var(--green); }

.set-input {
  background: #16181c; border: 1.5px solid var(--border);
  border-radius: 8px; color: var(--chalk);
  font-family: 'Barlow', sans-serif; font-size: 16px; font-weight: 600;
  padding: 9px 6px; width: 100%; text-align: center;
  outline: none; -webkit-appearance: none; transition: border-color 0.15s;
}
.set-input:focus { border-color: var(--amber); }
.set-input.filled { border-color: rgba(61,190,108,0.4); background: rgba(61,190,108,0.05); }
.set-input.wide { font-size: 13px; text-align: left; padding-left: 10px; }

.set-check {
  width: 32px; height: 32px; border-radius: 6px;
  background: var(--surface2); border: 1.5px solid var(--border);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 14px; transition: all 0.15s; user-select: none; color: transparent;
}
.set-check.checked { background: var(--green); border-color: var(--green); color: #000; }

/* ── ZONE 2 DURATION INPUT ── */
.zone2-block {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px; margin-bottom: 8px;
}
.zone2-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 17px; font-weight: 700; text-transform: uppercase; margin-bottom: 10px;
}
.zone2-row { display: flex; gap: 10px; align-items: center; }
.zone2-input {
  background: #16181c; border: 1.5px solid var(--border);
  border-radius: 8px; color: var(--chalk);
  font-family: 'Barlow', sans-serif; font-size: 20px; font-weight: 600;
  padding: 10px 12px; width: 90px; text-align: center;
  outline: none; -webkit-appearance: none; transition: border-color 0.15s;
}
.zone2-input:focus { border-color: var(--amber); }
.zone2-input.filled { border-color: rgba(61,190,108,0.4); background: rgba(61,190,108,0.05); }
.zone2-unit { font-size: 13px; color: var(--muted); }
.zone2-hint { font-size: 12px; color: var(--muted); margin-top: 8px; }

/* ── NOTE BTN ── */
.note-btn {
  background: none; border: none; color: var(--muted);
  font-size: 11px; padding: 6px 0 0; cursor: pointer;
  font-family: 'Barlow', sans-serif; display: flex; align-items: center; gap: 4px;
}
.ex-note-input {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 6px; color: var(--bone); font-family: 'Barlow', sans-serif;
  font-size: 12px; padding: 8px 10px; margin-top: 6px; outline: none; resize: none; height: 52px;
}
.ex-note-input:focus { border-color: var(--amber); }

/* ── INFO CALLOUT (for context notes) ── */
.callout {
  background: var(--surface2); border-left: 2px solid var(--muted);
  border-radius: 4px; padding: 8px 12px; margin-bottom: 10px;
  font-size: 12px; color: var(--muted); line-height: 1.6;
}
.callout strong { color: var(--bone); font-weight: 500; }

/* ── COMPLETE BTN ── */
.complete-btn {
  width: 100%; background: var(--green); border: none; border-radius: 10px;
  color: #000; font-family: 'Barlow Condensed', sans-serif;
  font-size: 17px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase;
  padding: 16px; margin-top: 20px; cursor: pointer; transition: opacity 0.15s;
}
.complete-btn:active { opacity: 0.8; }
.complete-btn.done-btn { background: var(--surface2); color: var(--green); border: 1.5px solid var(--green); }

/* ── PROGRESS PAGE ── */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
.stat-value { font-family: 'Barlow Condensed', sans-serif; font-size: 38px; font-weight: 900; line-height: 1; color: var(--chalk); }
.stat-value.c-amber { color: var(--amber); }
.stat-value.c-green { color: var(--green); }
.stat-label { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-top: 4px; }

.panel { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 14px; }
.panel-title { padding: 11px 16px; font-family: 'Barlow Condensed', sans-serif; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--border); }
.panel-row { display: flex; justify-content: space-between; align-items: center; padding: 11px 16px; border-bottom: 1px solid var(--border); }
.panel-row:last-child { border-bottom: none; }
.panel-row-label { font-size: 13px; color: var(--chalk); }
.panel-row-val { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; color: var(--amber); }
.panel-empty { padding: 16px; font-size: 13px; color: var(--muted); text-align: center; }

.heatmap-row { display: flex; align-items: center; gap: 8px; padding: 6px 16px; border-bottom: 1px solid var(--border); }
.heatmap-row:last-child { border-bottom: none; }
.heatmap-lbl { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; text-transform: uppercase; color: var(--muted); width: 28px; }
.heat-cell { flex: 1; height: 22px; border-radius: 4px; background: var(--surface2); border: 1px solid var(--border); }
.heat-cell.done-A     { background: var(--red);    border-color: var(--red);    opacity: 0.7; }
.heat-cell.done-B     { background: var(--blue);   border-color: var(--blue);   opacity: 0.7; }
.heat-cell.done-other { background: var(--green);  border-color: var(--green);  opacity: 0.7; }

.hist-item { padding: 11px 16px; border-bottom: 1px solid var(--border); }
.hist-item:last-child { border-bottom: none; }
.hist-date { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
.hist-name { font-size: 14px; color: var(--chalk); margin-top: 1px; }
.hist-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
.hist-meta span { color: var(--green); }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 76px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--green); color: #000;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
  padding: 11px 22px; border-radius: 8px; opacity: 0; transition: all 0.25s;
  z-index: 999; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--surface); border-top: 1px solid var(--border);
  display: flex; z-index: 100;
}
.bnav-btn {
  flex: 1; background: none; border: none; color: var(--muted);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
  padding: 10px 4px 12px; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 3px; transition: color 0.15s;
}
.bnav-btn .icon { font-size: 20px; }
.bnav-btn.active { color: var(--amber); }

.clear-btn {
  background: none; border: 1px solid var(--border); color: var(--muted);
  font-family: 'Barlow', sans-serif; font-size: 12px; padding: 10px 16px;
  border-radius: 8px; cursor: pointer; width: 100%; margin-top: 12px;
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">
    <div class="logo-dot"></div>
    <div class="logo-text">Hybrid <span>Tracker</span></div>
  </div>
</div>

<div id="page-train" class="page active"></div>
<div id="page-progress" class="page"></div>

<div class="bottom-nav">
  <button class="bnav-btn active" id="bnav-train" onclick="showPage('train')">
    <span class="icon">🏋️</span>Train
  </button>
  <button class="bnav-btn" id="bnav-progress" onclick="showPage('progress')">
    <span class="icon">📈</span>Progress
  </button>
</div>
<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════════════════
// PROGRAM DEFINITION
// ════════════════════════════════════════════════════════

const DAYS_META = [
  { id:'mon', label:'MON', short:'Lift',  type:'lift' },
  { id:'tue', label:'TUE', short:'Carry', type:'carry' },
  { id:'wed', label:'WED', short:'Lift',  type:'lift' },
  { id:'thu', label:'THU', short:'Power', type:'power' },
  { id:'fri', label:'FRI', short:'Lift',  type:'lift' },
  { id:'sat', label:'SAT', short:'Cond',  type:'conditioning' },
  { id:'sun', label:'SUN', short:'Rest',  type:'rest' },
];

// ── Full Body Lifting (IronLog) ──────────────────────
const LIFT = {
  A: {
    label:'Day A', sub:'Squat · Bench · Row',
    badge:'badge-A', badgeText:'Day A',
    exercises:[
      { id:'squat',    name:'Squat',           sets:4, rep:'8–12',  rest:'2 min' },
      { id:'bench',    name:'Bench Press',      sets:4, rep:'8–12',  rest:'2 min' },
      { id:'row',      name:'Barbell Row',      sets:4, rep:'8–12',  rest:'2 min' },
      { id:'ohp',      name:'Overhead Press',   sets:3, rep:'10–12', rest:'90 sec' },
      { id:'curl',     name:'Curl',             sets:3, rep:'12',    rest:'Superset', ss:true },
      { id:'pushdown', name:'Tricep Pushdown',  sets:3, rep:'12',    rest:'60 sec',   se:true },
    ]
  },
  B: {
    label:'Day B', sub:'Deadlift · Press · Pull',
    badge:'badge-B', badgeText:'Day B',
    exercises:[
      { id:'deadlift', name:'Deadlift',         sets:4, rep:'5–8',   rest:'2 min' },
      { id:'incline',  name:'Incline DB Press', sets:4, rep:'8–12',  rest:'2 min' },
      { id:'pulldown', name:'Lat Pulldown',     sets:4, rep:'8–12',  rest:'2 min' },
      { id:'legpress', name:'Leg Press',        sets:3, rep:'10–12', rest:'90 sec' },
      { id:'lateral',  name:'Lateral Raise',    sets:3, rep:'15',    rest:'Superset', ss:true },
      { id:'facepull', name:'Face Pull',        sets:3, rep:'15',    rest:'60 sec',   se:true },
    ]
  }
};

// ── Tuesday: Carries + Zone 2 ────────────────────────
// mode: 'weight-reps' = kg + reps + ✓  |  'distance' = distance note + ✓  |  'duration' = mins input
const CARRY_EXERCISES = [
  { id:'farmer_carry', name:"Farmer's Carry",  sets:4, rep:'40m',   rest:'90 sec', mode:'distance',    note:'Heaviest KB/DB. Tall posture. Full reset between passes.' },
  { id:'zone2',        name:'Zone 2 Cardio',   sets:1, rep:'20 min',rest:'—',      mode:'duration',    note:'Jump rope or walk. HR 120–140 bpm.' },
];

// ── Thursday: Power + Plyo ───────────────────────────
const POWER_EXERCISES = [
  { id:'box_jump',    name:'Box Jump',          sets:5, rep:'3',     rest:'90 sec', mode:'reps-only',   note:'Max effort. Full reset between reps. Land soft.' },
  { id:'kb_swing',    name:'KB Swing',          sets:5, rep:'8',     rest:'60 sec', mode:'weight-reps', note:'Hip hinge explosion. Lock glutes at top.' },
  { id:'exp_pushup',  name:'Explosive Push-up', sets:4, rep:'5',     rest:'60 sec', mode:'reps-only',   note:'Chest to floor → push hands off ground.' },
  { id:'rope_sprint', name:'Jump Rope Sprint',  sets:6, rep:'20s',   rest:'40s off',mode:'reps-only',   note:'Max speed. 20s on / 40s off.' },
];

// ── Saturday: Hybrid Conditioning ───────────────────
const COND_EXERCISES = [
  { id:'db_thruster',   name:'DB Thruster',     sets:5, rep:'10',    rest:'—',      mode:'weight-reps', note:'Squat to press. Part of circuit — no rest between exercises.' },
  { id:'renegade_row',  name:'Renegade Row',    sets:5, rep:'10',    rest:'—',      mode:'weight-reps', note:'Plank position. Row each arm. Keep hips level.' },
  { id:'pushup_cond',   name:'Push-up',         sets:5, rep:'10',    rest:'—',      mode:'reps-only',   note:'Strict form.' },
  { id:'walk_lunge',    name:'Walking Lunge',   sets:5, rep:'15',    rest:'—',      mode:'reps-only',   note:'Continuous. Upright torso.' },
  { id:'carry_cond',    name:'Farmer Carry',    sets:5, rep:'40m',   rest:'90 sec', mode:'weight-reps', note:'40m carry. Rest 90s AFTER completing full round.' },
];

// ════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════
let ST = {
  activeDayIdx: getCurrentDayIdx(),
  sessionData: {},
};

function getCurrentDayIdx() {
  const d = new Date().getDay();
  return d === 0 ? 6 : d - 1;
}
function getTodayStr() { return new Date().toISOString().split('T')[0]; }
function getDateStr(dayIdx) {
  const offset = dayIdx - getCurrentDayIdx();
  const d = new Date();
  d.setDate(d.getDate() + offset);
  return d.toISOString().split('T')[0];
}
function getSessionKey(dayIdx, dateStr) {
  dateStr = dateStr || getDateStr(dayIdx);
  return `${dateStr}_${DAYS_META[dayIdx].id}`;
}
function getSession(dayIdx, dateStr) {
  return ST.sessionData[getSessionKey(dayIdx, dateStr)] || null;
}
function ensureSession(dayIdx) {
  const dateStr = getDateStr(dayIdx);
  const key = getSessionKey(dayIdx, dateStr);
  if (!ST.sessionData[key]) {
    ST.sessionData[key] = {
      dayId: DAYS_META[dayIdx].id,
      dayType: DAYS_META[dayIdx].type,
      dateStr, completed: false, ts: null,
      liftVariant: null, sets: {}, notes: {},
    };
  }
  return ST.sessionData[key];
}
function loadStorage() {
  try {
    const raw = localStorage.getItem('htt_v3');
    if (raw) { const d = JSON.parse(raw); ST.sessionData = d.sessionData || {}; }
  } catch(e) {}
}
function saveStorage() {
  try { localStorage.setItem('htt_v3', JSON.stringify({ sessionData: ST.sessionData })); } catch(e) {}
}

// ════════════════════════════════════════════════════════
// SHARED: RENDER EXERCISE BLOCK
// ════════════════════════════════════════════════════════
function renderExerciseBlock(ex, session, dayIdx, autoOpenFirst) {
  const setsData = session.sets[ex.id] || {};
  const checkedCount = Object.values(setsData).filter(s => s.checked).length;
  const allDone = checkedCount === ex.sets;
  const prevBest = findPrevBest(dayIdx, ex.id, session.liftVariant);
  const noteVal = session.notes[ex.id] || '';
  const mode = ex.mode || 'weight-reps';

  // Header row labels & grid based on mode
  let hdrHtml = '';
  let rowsHtml = '';

  if (mode === 'weight-reps') {
    hdrHtml = `<div class="sets-row-hdr"><span>#</span><span>KG</span><span>Reps</span><span></span></div>`;
    for (let s = 1; s <= ex.sets; s++) {
      const sd = setsData[s] || {};
      rowsHtml += `
        <div class="${sd.checked ? 'set-row completed' : 'set-row'}" id="row-${ex.id}-${s}">
          <div class="set-num">${s}</div>
          <input class="set-input ${sd.kg ? 'filled':''}" type="number" inputmode="decimal"
            placeholder="kg" value="${sd.kg||''}"
            onchange="updateSet('${ex.id}',${s},'kg',this.value,${dayIdx})" onfocus="this.select()">
          <input class="set-input ${sd.reps ? 'filled':''}" type="number" inputmode="numeric"
            placeholder="${ex.rep}" value="${sd.reps||''}"
            onchange="updateSet('${ex.id}',${s},'reps',this.value,${dayIdx})" onfocus="this.select()">
          <div class="set-check ${sd.checked?'checked':''}" onclick="toggleCheck('${ex.id}',${s},${dayIdx})">${sd.checked?'✓':''}</div>
        </div>`;
    }
  } else if (mode === 'reps-only') {
    hdrHtml = `<div class="sets-row-hdr"><span>#</span><span>Reps / Notes</span><span></span></div>`;
    for (let s = 1; s <= ex.sets; s++) {
      const sd = setsData[s] || {};
      rowsHtml += `
        <div class="${sd.checked ? 'set-row completed cols3' : 'set-row cols3'}" id="row-${ex.id}-${s}">
          <div class="set-num">${s}</div>
          <input class="set-input ${sd.reps ? 'filled':''}" type="number" inputmode="numeric"
            placeholder="${ex.rep}" value="${sd.reps||''}"
            onchange="updateSet('${ex.id}',${s},'reps',this.value,${dayIdx})" onfocus="this.select()">
          <div class="set-check ${sd.checked?'checked':''}" onclick="toggleCheck('${ex.id}',${s},${dayIdx})">${sd.checked?'✓':''}</div>
        </div>`;
    }
  } else if (mode === 'distance') {
    hdrHtml = `<div class="sets-row-hdr cols3"><span>#</span><span>Distance / Load note</span><span></span></div>`;
    for (let s = 1; s <= ex.sets; s++) {
      const sd = setsData[s] || {};
      rowsHtml += `
        <div class="${sd.checked ? 'set-row completed cols3' : 'set-row cols3'}" id="row-${ex.id}-${s}">
          <div class="set-num">${s}</div>
          <input class="set-input wide ${sd.note ? 'filled':''}" type="text" inputmode="text"
            placeholder="e.g. 24kg DB, 40m" value="${sd.note||''}"
            onchange="updateSet('${ex.id}',${s},'note',this.value,${dayIdx})">
          <div class="set-check ${sd.checked?'checked':''}" onclick="toggleCheck('${ex.id}',${s},${dayIdx})">${sd.checked?'✓':''}</div>
        </div>`;
    }
  } else if (mode === 'duration') {
    // Single duration input
    const sd = setsData[1] || {};
    rowsHtml = `
      <div class="zone2-row">
        <input class="zone2-input ${sd.mins ? 'filled':''}" type="number" inputmode="numeric"
          placeholder="0" value="${sd.mins||''}"
          onchange="updateSet('${ex.id}',1,'mins',this.value,${dayIdx})">
        <span class="zone2-unit">min</span>
        <div class="set-check ${sd.checked?'checked':''}" style="margin-left:auto" onclick="toggleCheck('${ex.id}',1,${dayIdx})">${sd.checked?'✓':''}</div>
      </div>
      <div class="zone2-hint">Target: ${ex.rep} · ${ex.note}</div>`;
    hdrHtml = '';
  }

  const prevHintHtml = prevBest && mode === 'weight-reps'
    ? `<div class="prev-hint">Last: <em>${prevBest.kg}kg × ${prevBest.reps}</em></div>` : '';

  const blockCls = ex.se ? 'exercise-block superset-end' : 'exercise-block';
  return `
    <div class="${blockCls}" id="exblock-${ex.id}">
      <div class="exercise-hdr" onclick="toggleEx('${ex.id}')">
        <div>
          <div class="exercise-name">${ex.name}</div>
          ${ex.rest ? `<div class="ex-rest-lbl">${ex.sets}× · ${ex.rest}</div>` : ''}
        </div>
        <div class="exercise-meta-row">
          <span class="ex-scheme">${ex.rep}</span>
          <div class="ex-done-badge ${allDone ? 'show':''}" id="done-${ex.id}">✓</div>
        </div>
      </div>
      <div class="sets-container" id="sets-${ex.id}">
        ${prevHintHtml}
        ${ex.note && mode !== 'duration' ? `<div class="callout">${ex.note}</div>` : ''}
        ${hdrHtml}
        ${rowsHtml}
        ${mode !== 'duration' ? `
          <button class="note-btn" onclick="toggleNote('${ex.id}')">＋ Note</button>
          <textarea class="ex-note-input" id="note-${ex.id}"
            placeholder="RPE, how it felt..."
            style="display:${noteVal ? 'block':'none'}"
            onchange="updateNote('${ex.id}',this.value,${dayIdx})">${noteVal}</textarea>` : ''}
      </div>
    </div>`;
}

// RENDER: TRAIN PAGE
// ════════════════════════════════════════════════════════
function renderTrainPage() {
  const el = document.getElementById('page-train');
  const dayIdx = ST.activeDayIdx;
  const meta = DAYS_META[dayIdx];
  const session = ensureSession(dayIdx);

  // Week strip
  let html = '<div class="week-strip">';
  DAYS_META.forEach((d, i) => {
    const sess = getSession(i, getDateStr(i));
    let cls = 'day-chip' + (i === dayIdx ? ' active' : '');
    if (sess && sess.completed && i !== dayIdx) {
      const v = sess.liftVariant;
      cls += v === 'A' ? ' done-a' : v === 'B' ? ' done-b' : ' done-other';
    }
    html += `
      <div class="${cls}" onclick="selectDay(${i})">
        <span class="day-chip-lbl">${d.label}</span>
        <span class="day-chip-name">${d.short}</span>
        <div class="day-chip-dot"></div>
      </div>`;
  });
  html += '</div>';

  if (meta.type === 'lift')          html += renderLiftSession(dayIdx, session);
  else if (meta.type === 'carry')    html += renderExSession('Carries + Zone 2', 'Grip · Core · Aerobic base', 'badge-carry', CARRY_EXERCISES, dayIdx, session);
  else if (meta.type === 'power')    html += renderExSession('Power + Plyo', 'Explosive output · Fast-twitch', 'badge-power', POWER_EXERCISES, dayIdx, session);
  else if (meta.type === 'conditioning') html += renderCondSession(dayIdx, session);
  else                               html += renderRestSession(dayIdx, session);

  el.innerHTML = html;

  // Auto-open first incomplete exercise
  let exList = null;
  if (meta.type === 'lift' && session.liftVariant) exList = LIFT[session.liftVariant].exercises;
  else if (meta.type === 'carry') exList = CARRY_EXERCISES;
  else if (meta.type === 'power') exList = POWER_EXERCISES;
  else if (meta.type === 'conditioning') exList = COND_EXERCISES;

  if (exList) {
    const first = exList.find(ex => {
      const sd = session.sets[ex.id] || {};
      return Object.values(sd).filter(s => s.checked).length < ex.sets;
    }) || exList[0];
    if (first) {
      const container = document.getElementById(`sets-${first.id}`);
      if (container) container.classList.add('open');
    }
  }
}

// ── Lift session ─────────────────────────────────────
function renderLiftSession(dayIdx, session) {
  const variant = session.liftVariant;
  const hdrTitle = variant ? `Full Body — ${LIFT[variant].label}` : 'Full Body';
  const hdrSub = variant ? LIFT[variant].sub : 'Select Day A or B below';
  const badgeCls = variant ? `session-badge badge-${variant}` : 'session-badge badge-rest';

  let html = `
    <div class="session-hdr">
      <div class="session-hdr-top">
        <div>
          <div class="session-title">${hdrTitle}</div>
          <div class="session-sub">${hdrSub}</div>
        </div>
        <div class="${badgeCls}">${variant ? `Day ${variant}` : 'Choose'}</div>
      </div>
      <div class="day-sel">
        <button class="day-sel-btn ${variant==='A'?'sel-A':''}" onclick="selectVariant('A',${dayIdx})">
          DAY A<span class="dsub">Squat · Bench · Row</span>
        </button>
        <button class="day-sel-btn ${variant==='B'?'sel-B':''}" onclick="selectVariant('B',${dayIdx})">
          DAY B<span class="dsub">Deadlift · Press · Pull</span>
        </button>

  if (!variant) {
    html += `<div style="text-align:center;padding:40px 0;color:var(--muted);font-size:13px;">Pick Day A or B to load exercises</div>`;
    return html;

  html += '<div class="section-label">Exercises</div>';

    if (ex.ss) html += `<div class="ss-div"><div class="ss-line"></div><div class="ss-lbl">Superset</div><div class="ss-line"></div></div>`;

// ════════════════════════════════════════════════════════
// INTERACTIONS
// ════════════════════════════════════════════════════════
function selectDay(idx) { ST.activeDayIdx = idx; renderTrainPage(); }

function selectVariant(variant, dayIdx) {
  const session = ensureSession(dayIdx);
  if (session.liftVariant && session.liftVariant !== variant) {
    if (!confirm(`Switch to Day ${variant}? Set data for this session will be cleared.`)) return;
    session.sets = {}; session.notes = {};
  }
  session.liftVariant = variant;
  saveStorage(); renderTrainPage();
}

function toggleEx(exId) {
  const el = document.getElementById(`sets-${exId}`);
  if (el) el.classList.toggle('open');
}

function toggleNote(exId) {
  const el = document.getElementById(`note-${exId}`);
  if (!el) return;
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
  if (el.style.display === 'block') el.focus();
}

function updateSet(exId, setNum, field, value, dayIdx) {
  const session = ensureSession(dayIdx);
  if (!session.sets[exId]) session.sets[exId] = {};
  if (!session.sets[exId][setNum]) session.sets[exId][setNum] = {};
  session.sets[exId][setNum][field] = value;
  document.querySelectorAll(`#row-${exId}-${setNum} .set-input`).forEach(i => {
    i.classList.toggle('filled', i.value !== '');
  });
  saveStorage();
}

function toggleCheck(exId, setNum, dayIdx) {
  const session = ensureSession(dayIdx);
  if (!session.sets[exId]) session.sets[exId] = {};
  if (!session.sets[exId][setNum]) session.sets[exId][setNum] = {};
  const wasChecked = session.sets[exId][setNum].checked;
  session.sets[exId][setNum].checked = !wasChecked;

  const checkEl = document.querySelector(`#row-${exId}-${setNum} .set-check`);
  const rowEl = document.getElementById(`row-${exId}-${setNum}`);
  if (checkEl) { checkEl.classList.toggle('checked', !wasChecked); checkEl.textContent = !wasChecked ? '✓' : ''; }
  if (rowEl) rowEl.classList.toggle('completed', !wasChecked);

  // Determine exercise list for this day type
  const meta = DAYS_META[dayIdx];
  let exList = null;
  if (meta.type === 'lift' && session.liftVariant) exList = LIFT[session.liftVariant].exercises;
  else if (meta.type === 'carry') exList = CARRY_EXERCISES;
  else if (meta.type === 'power') exList = POWER_EXERCISES;
  else if (meta.type === 'conditioning') exList = COND_EXERCISES;

  if (exList) {
    const ex = exList.find(e => e.id === exId);
    if (ex) {
      const sd = session.sets[exId] || {};
      const allDone = Object.values(sd).filter(s => s.checked).length === ex.sets;
      const badge = document.getElementById(`done-${exId}`);
      if (badge) badge.classList.toggle('show', allDone);

      // Auto-advance to next exercise
      if (allDone) {
        const idx = exList.findIndex(e => e.id === exId);
        if (idx < exList.length - 1) {
          const next = exList[idx + 1];
          const curEl = document.getElementById(`sets-${exId}`);
          const nextEl = document.getElementById(`sets-${next.id}`);
          if (curEl) curEl.classList.remove('open');
          if (nextEl) { nextEl.classList.add('open'); nextEl.scrollIntoView({ behavior:'smooth', block:'start' }); }
        }
      }
    }
  }
  saveStorage();
}

function updateNote(exId, value, dayIdx) {
  const session = ensureSession(dayIdx);
  session.notes[exId] = value;
  saveStorage();
}

function completeSession(dayIdx) {
  const session = ensureSession(dayIdx);
  session.completed = !session.completed;
  session.ts = session.completed ? new Date().toISOString() : null;
  saveStorage();
  showToast(session.completed ? '🔥 Logged!' : 'Unmarked');
  renderTrainPage();
}

function findPrevBest(dayIdx, exId, variant) {
  const dayId = DAYS_META[dayIdx].id;
  const currentKey = getSessionKey(dayIdx);
  const past = Object.entries(ST.sessionData)
    .filter(([k, v]) => v.dayId === dayId && v.liftVariant === variant && k !== currentKey)
    .sort((a, b) => b[0].localeCompare(a[0]));
  for (const [, sess] of past) {
    const sets = sess.sets?.[exId];
    if (sets) {
      const vals = Object.values(sets).filter(s => s.checked && s.kg && s.reps);
      if (vals.length) {
        const maxKg = Math.max(...vals.map(s => parseFloat(s.kg)||0));
        const best = vals.find(s => parseFloat(s.kg) === maxKg);
        return best ? { kg: best.kg, reps: best.reps } : null;
      }
    }
  }
  return null;
}

// ════════════════════════════════════════════════════════
// RENDER: PROGRESS PAGE
// ════════════════════════════════════════════════════════
function renderProgressPage() {
  const el = document.getElementById('page-progress');
  const allSess = Object.values(ST.sessionData);
  const done = allSess.filter(s => s.completed);
  const volume = computeVolume();
  const streak = computeStreak();
  const prs = computePRs();

  let html = `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-value c-amber">${done.length}</div><div class="stat-label">Sessions done</div></div>
      <div class="stat-card"><div class="stat-value c-green">${streak}</div><div class="stat-label">Day streak</div></div>
      <div class="stat-card"><div class="stat-value">${volume >= 1000 ? Math.round(volume/1000)+'k' : volume}</div><div class="stat-label">Total kg lifted</div></div>
      <div class="stat-card"><div class="stat-value">${done.filter(s=>s.dayType==='lift').length}</div><div class="stat-label">Lift sessions</div></div>
    </div>`;

  // Heatmap
  html += '<div class="panel"><div class="panel-title">This Week</div>';
  DAYS_META.forEach((d, i) => {
    const sess = getSession(i, getDateStr(i));
    const isDone = sess && sess.completed;
    const v = sess && sess.liftVariant;
    let cellCls = 'heat-cell' + (isDone ? (v==='A' ? ' done-A' : v==='B' ? ' done-B' : ' done-other') : '');
    const label = isDone ? (v ? `Day ${v}` : '✓') : '';
    html += `
      <div class="heatmap-row">
        <div class="heatmap-lbl">${d.label}</div>
        <div class="${cellCls}"></div>
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--muted);min-width:40px;text-align:right">${label}</div>
      </div>`;
  });
  html += '</div>';

  // PRs
  html += '<div class="panel"><div class="panel-title">Best Sets Per Exercise</div>';
  const prEntries = Object.entries(prs);
  if (!prEntries.length) {
    html += '<div class="panel-empty">Log sets to see PRs</div>';
  } else {
    prEntries.forEach(([name, best]) => {
      html += `<div class="panel-row"><div class="panel-row-label">${name}</div><div class="panel-row-val">${best.kg}kg × ${best.reps}</div></div>`;
    });
  }
  html += '</div>';

  // History
  const sorted = [...done].sort((a,b) => (b.ts||'').localeCompare(a.ts||''));
  html += '<div class="panel"><div class="panel-title">Session History</div>';
  if (!sorted.length) {
    html += '<div class="panel-empty">No sessions completed yet</div>';
  } else {
    sorted.slice(0, 25).forEach(s => {
      const date = s.dateStr ? formatDate(s.dateStr) : '—';
      const setsCount = Object.values(s.sets||{}).reduce((acc, ex) =>
        acc + Object.values(ex).filter(set => set.checked).length, 0);
      const v = s.liftVariant ? ` · Day ${s.liftVariant}` : '';
      const dayLabel = DAYS_META.find(d=>d.id===s.dayId)?.label || '';
      const typeName = {lift:'Full Body',carry:'Carries + Zone 2',power:'Power + Plyo',conditioning:'Conditioning',rest:'Rest'}[s.dayType] || s.dayType;
      html += `
        <div class="hist-item">
          <div class="hist-date">${date}</div>
          <div class="hist-name">${dayLabel}${v} — ${typeName}</div>
          <div class="hist-meta">${setsCount > 0 ? `<span>${setsCount} sets logged</span>` : 'Done ✓'}</div>
        </div>`;
    });
  }
  html += '</div>';

  html += `<button class="clear-btn" onclick="clearAll()">Clear All Data</button>`;
  el.innerHTML = html;
}

function computeVolume() {
  let total = 0;
  Object.values(ST.sessionData).forEach(sess => {
    Object.values(sess.sets||{}).forEach(exSets => {
      Object.values(exSets).forEach(set => {
        if (set.checked && set.kg && set.reps) total += parseFloat(set.kg) * parseInt(set.reps);
      });
    });
  });
  return Math.round(total);
}

function computeStreak() {
  let streak = 0;
  const today = new Date();
  for (let i = 0; i < 90; i++) {
    const d = new Date(today); d.setDate(d.getDate() - i);
    const dateStr = d.toISOString().split('T')[0];
    const dow = d.getDay();
    const dayIdx = dow === 0 ? 6 : dow - 1;
    if (dayIdx === 6) { if (i > 0) streak++; continue; }
    const sess = getSession(dayIdx, dateStr);
    if (sess && sess.completed) { streak++; }
    else if (i === 0) continue;
    else break;
  }
  return streak;
}

function computePRs() {
  const prs = {};
  Object.values(ST.sessionData).forEach(sess => {
    Object.entries(sess.sets||{}).forEach(([exId, exSets]) => {
      let name = exId;
      ['A','B'].forEach(v => { const ex = LIFT[v]?.exercises.find(e=>e.id===exId); if (ex) name = ex.name; });
      [...CARRY_EXERCISES, ...POWER_EXERCISES, ...COND_EXERCISES].forEach(ex => { if (ex.id === exId) name = ex.name; });
      Object.values(exSets).forEach(set => {
        if (set.checked && set.kg && set.reps) {
          const kg = parseFloat(set.kg);
          if (!prs[name] || kg > parseFloat(prs[name].kg)) prs[name] = { kg: set.kg, reps: set.reps };
        }
      });
    });
  });
  return prs;
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short' });
}

function clearAll() {
  if (!confirm('Clear all training data? Cannot be undone.')) return;
  localStorage.removeItem('htt_v3');
  ST.sessionData = {};
  showToast('Data cleared');
  renderProgressPage(); renderTrainPage();
}

function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.bnav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`page-${page}`).classList.add('active');
  document.getElementById(`bnav-${page}`).classList.add('active');
  if (page === 'progress') renderProgressPage();
  else renderTrainPage();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

loadStorage();
renderTrainPage();
</script>
